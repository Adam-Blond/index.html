<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The News Detective — Max Factwell</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500&family=DM+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F6F2;
  --surface:#FFFFFF;
  --surface2:#F0EFE9;
  --border:#E2E0D8;
  --border2:#C8C6BC;
  --text:#1A1917;
  --text2:#6B6860;
  --text3:#9E9C95;
  --accent:#1A1917;
  --accent-bg:#1A1917;
  --accent-fg:#F7F6F2;
  --green:#166534;
  --green-bg:#DCFCE7;
  --green-border:#86EFAC;
  --red:#991B1B;
  --red-bg:#FEE2E2;
  --red-border:#FCA5A5;
  --amber:#92400E;
  --amber-bg:#FEF3C7;
  --amber-border:#FCD34D;
  --blue:#1E40AF;
  --blue-bg:#EFF6FF;
  --blue-border:#BFDBFE;
  --radius:10px;
  --radius-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.6;min-height:100vh}
#shell{max-width:700px;margin:0 auto;padding:2rem 1.25rem 4rem}

/* Header */
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:2.5rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border)}
.logo{width:40px;height:40px;background:var(--accent-bg);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--accent-fg);font-family:'DM Serif Display',serif;font-size:17px;flex-shrink:0}
.logo-text{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text)}
.logo-sub{font-size:12px;color:var(--text3);letter-spacing:.04em}
.score-wrap{margin-left:auto;text-align:right}
.score-num{font-size:24px;font-family:'DM Serif Display',serif;color:var(--text)}
.score-lbl{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase}

/* Progress */
.prog-wrap{margin-bottom:1.75rem}
.prog-phases{display:flex;gap:8px;margin-bottom:10px}
.phase-pip{flex:1;text-align:center;padding:5px 8px;border-radius:6px;font-size:11px;border:1px solid var(--border);color:var(--text3);background:var(--surface)}
.phase-pip.done{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.phase-pip.act{background:var(--accent-bg);border-color:var(--accent-bg);color:var(--accent-fg)}
.prog-bar{height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent-bg);border-radius:2px;transition:width .4s cubic-bezier(.4,0,.2,1)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem}
.card-sm{background:var(--surface2);border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1rem}

/* News card */
.src-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--text2);flex-shrink:0}
.src-name{font-size:13px;font-weight:500}
.src-handle{font-size:12px;color:var(--text3)}
.headline{font-family:'DM Serif Display',serif;font-size:18px;line-height:1.3;margin-bottom:8px}
.body-txt{font-size:13px;color:var(--text2);line-height:1.65}
.url-bar{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:6px 12px;font-size:12px;font-family:'DM Mono',monospace;color:var(--text2);margin-top:10px;word-break:break-all}
.news-meta{font-size:11px;color:var(--text3);margin-top:8px;letter-spacing:.02em}

/* Question */
.q-phase-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.q-text{font-size:15px;font-weight:500;line-height:1.5;margin-bottom:8px}
.q-hint{font-size:12px;color:var(--text2);font-style:italic;margin-bottom:12px;padding-left:12px;border-left:2px solid var(--border2)}

/* Buttons / options */
.opts{display:flex;flex-direction:column;gap:8px}
.opt{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text);cursor:pointer;text-align:left;line-height:1.5;font-family:'DM Sans',sans-serif;transition:border-color .12s,background .12s}
.opt:hover:not(:disabled){background:var(--surface2);border-color:var(--border2)}
.opt:disabled{cursor:default}
.opt.ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.opt.bad{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}
.opt.reveal{background:var(--green-bg);border-color:var(--green-border);color:var(--green);opacity:.55}
.opt.primary{background:var(--accent-bg);color:var(--accent-fg);border-color:var(--accent-bg);font-weight:500}
.opt.primary:hover:not(:disabled){opacity:.9}
.opt.wide{width:100%;text-align:center}

/* Feedback */
.fb{border-radius:var(--radius);padding:10px 14px;font-size:13px;line-height:1.55;margin-top:10px;display:none}
.fb.show{display:block}
.fb.good{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.fb.bad{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}

/* Drag & drop */
.drag-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.zone-lbl{font-size:11px;font-weight:500;letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.zone-lbl.red{color:var(--red)}
.zone-lbl.green{color:var(--green)}
.drag-zone{background:var(--surface);border:1px dashed var(--border2);border-radius:var(--radius);padding:8px;min-height:46px;display:flex;flex-wrap:wrap;gap:6px;transition:border-color .12s,background .12s}
.drag-zone.over{border-color:var(--accent-bg);background:var(--surface2)}
.pool-lbl{font-size:12px;color:var(--text3);margin-bottom:5px}
.chip{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--text);cursor:grab;user-select:none;transition:opacity .12s}
.chip:active{opacity:.7}
.chip.cok{background:var(--green-bg);border-color:var(--green-border);color:var(--green)}
.chip.cbad{background:var(--red-bg);border-color:var(--red-border);color:var(--red)}

/* Rank */
.rank-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:10px;user-select:none;transition:border-color .12s,background .12s}
.rank-item .grip{color:var(--text3);font-size:18px;letter-spacing:-2px}
.rank-item.sel{border-color:var(--accent-bg);background:var(--surface2)}
.rank-item.rk-ok{background:var(--green-bg);border-color:var(--green-border);color:var(--green);cursor:default}
.rank-item.rk-bad{background:var(--red-bg);border-color:var(--red-border);color:var(--red);cursor:default}

/* Tool mechanic */
.tool-btn{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;font-size:13px;color:var(--text);cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;width:100%;margin-bottom:10px;font-family:'DM Sans',sans-serif;transition:border-color .12s,background .12s}
.tool-btn:hover{background:var(--surface2);border-color:var(--border2)}
.tool-btn.used{border-color:var(--green-border);background:var(--green-bg);color:var(--green)}
.tool-icon{width:32px;height:32px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.tool-result{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.55;display:none}
.tool-result.show{display:block}

/* Credibility meter */
.meter-labels{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.meter-track{height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;border:1px solid var(--border);margin-bottom:8px}
.meter-fill{height:100%;border-radius:5px;transition:width .3s,background .3s}
input[type=range]{width:100%;accent-color:var(--accent-bg);margin-bottom:4px}
.meter-val{text-align:center;font-size:13px;color:var(--text2);margin-bottom:12px}

/* Intro / case selection */
.intro-header{margin-bottom:1.75rem}
.intro-title{font-family:'DM Serif Display',serif;font-size:32px;line-height:1.15;margin-bottom:8px}
.intro-sub{font-size:14px;color:var(--text2);line-height:1.65;max-width:520px}
.case-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1.5rem}
.c-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;cursor:pointer;transition:border-color .12s,transform .12s}
.c-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.c-card.picked{border-color:var(--accent-bg);background:var(--surface2);box-shadow:0 0 0 2px var(--accent-bg)}
.c-tag{font-size:11px;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:5px}
.c-title{font-size:13px;font-weight:500;line-height:1.45}

/* Phase intro */
.phase-intro-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem}
.p-num{font-size:11px;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.p-title{font-family:'DM Serif Display',serif;font-size:26px;margin-bottom:4px}
.p-sub{font-size:13px;color:var(--text2);font-style:italic;margin-bottom:10px}
.p-desc{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:14px}
.skill-tags{display:flex;flex-wrap:wrap;gap:6px}
.skill-tag{background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 11px;font-size:11px;color:var(--text2)}

/* Verdict */
.verdict-wrap{text-align:center;padding:2rem 1rem}
.v-icon{font-size:52px;margin-bottom:14px}
.v-title{font-family:'DM Serif Display',serif;font-size:32px;margin-bottom:8px}
.v-sub{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:1.75rem;max-width:480px;margin-left:auto;margin-right:auto}
.skill-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem;text-align:left}
.skill-box-title{font-size:13px;font-weight:500;margin-bottom:12px}
.skill-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.skill-name{font-size:12px;color:var(--text2);width:130px;flex-shrink:0}
.skill-bar{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden}
.skill-fill{height:100%;border-radius:3px;background:var(--accent-bg);transition:width .6s .2s}
.skill-count{font-size:12px;color:var(--text3);width:28px;text-align:right}
.phase-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px solid var(--border)}
.phase-row:last-child{border-bottom:none}
.case-box{background:var(--surface2);border-radius:var(--radius);padding:1rem;margin-bottom:1.25rem;text-align:left}
.verdict-badge{display:inline-block;background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);border-radius:20px;padding:3px 12px;font-size:11px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;margin-bottom:6px}
.case-context{font-size:13px;color:var(--text2);line-height:1.65}

@media(max-width:480px){
  .case-grid{grid-template-columns:1fr}
  .drag-grid{grid-template-columns:1fr}
  .headline{font-size:16px}
  .intro-title{font-size:26px}
}
</style>
</head>
<body>
<div id="shell">
  <div class="top-bar">
    <div class="logo">MF</div>
    <div><div class="logo-text">The News Detective</div><div class="logo-sub">Max Factwell · Media Literacy Training</div></div>
    <div class="score-wrap"><div class="score-num" id="score-disp">0</div><div class="score-lbl">Points</div></div>
  </div>
  <div id="scr-intro"></div>
  <div id="scr-phase-intro" style="display:none"></div>
  <div id="scr-game" style="display:none"></div>
  <div id="scr-verdict" style="display:none"></div>
</div>

<script>

factResult:"AP Fact Check: FALSE. Election officials from both parties, independent monitors and courts found no evidence of coordinated fraud.",

verdict:"FAKE"}

const P1_QS=[
{id:"tone",skill:"Emotional tone",type:"c4",
text:"Which word best describes the emotional register of this headline?",
hint:"Misinformation uses language to make you feel before you think.",
opts:[
{t:"Neutral — reports facts without loaded language",ok:false,fb:"Neutral language uses precise numbers and attribution. This post uses vague superlatives and alarm language."},
{t:"Alarming — designed to create urgency or fear",ok:true,fb:"Correct. Words like 'secretly', 'shocked', 'confirm' signal emotional manipulation. Real journalism uses measured language even for serious stories."},

]},

text:"What does the post want you to DO after reading it?",
hint:"Real journalism informs. Misinformation usually wants to trigger an action.",
opts:[
{t:"Understand a complex situation through multiple perspectives",ok:false,fb:"Presenting multiple perspectives is a hallmark of quality journalism. This post does the opposite."},
{t:"Share it immediately before checking — 'people need to know this now'",ok:true,fb:"Urgency that pressures you to share before thinking is a manipulation tactic. Misinformation spreads fastest in the first hour — by design."},

{t:"Check the URL and publication date",order:0},
{t:"Search the claim on major news sites (Google News, Reuters)",order:1},
{t:"Look up the source account's history and credibility",order:2},
{t:"Use a reverse image search on photos in the post",order:3},
{t:"Consult a professional fact-checking database (Snopes, Full Fact)",order:4}
]}
];

const P3_QS=[
{id:"factcheck_tool",skill:"Fact-check tools",type:"tool",
text:"Use the fact-check search tool to look up the main claim in this post.",
hint:"Professional fact-checkers have already investigated many viral claims.",
toolLabel:"Open fact-check database",toolIcon:"🔍",
opts:[
{t:"Marked 'FALSE' or 'MISLEADING' by a verified fact-checking organisation",ok:true,fb:"If a professional organisation has already debunked it, your job is nearly done. Note the organisation and date of debunking."},
{t:"No results found in fact-check databases",ok:false,fb:"No result means the claim is too new or niche to have been checked yet. Absence of a fact-check is not confirmation it's true. Continue to the next tool."}
]},
{id:"reverse_img",skill:"Image verification",type:"tool",
text:"The post contains a striking image. Use reverse image search to find its original source.",
hint:"'Zombie images' — old photos used out of context — are one of the most common deception tactics.",
toolLabel:"Run reverse image search",toolIcon:"🖼️",
opts:[
{t:"The image is original and matches the date and location claimed",ok:false,fb:"Good — an original, contextually correct image is a positive signal. But it doesn't confirm the text claims are true. Continue investigating."},
{t:"The image was taken years ago in a completely different context",ok:true,fb:"You've found a 'zombie image' — old or unrelated media repurposed for a new claim. This is direct evidence of deception, even if other details are accurate."}
]},
{id:"deepfake",skill:"AI detection",type:"tool",
text:"The post includes a video of a public figure making a shocking statement. Analyse it for AI manipulation.",
hint:"Look for: unnatural blinking, jaw inconsistencies, hair flickering, lip-sync errors, strange lighting on the face.",
toolLabel:"Run deepfake detection",toolIcon:"🤖",
opts:[
{t:"Shadows and blinking look natural; no rendering artefacts detected",ok:false,fb:"A clean result is reassuring, but deepfakes are improving rapidly. Always corroborate with other sources even if detection tools find nothing."},
{t:"Facial rendering artefacts detected — lip-sync inconsistencies and unnatural jaw movement",ok:true,fb:"Strong evidence of AI manipulation. Document the specific artefacts: jaw, hairline, blinking. This constitutes technical proof to include in a fact-check report."}
]},
{id:"credibility_meter",skill:"Final verdict",type:"meter",
text:"Based on all your investigation, set the Credibility Meter and issue your final verdict.",
hint:"Weigh all the evidence you've gathered across all three phases."}
];

let selCase=null,phase=1,qQueue=[],qIdx=0,score=0,phaseScores=[0,0,0],answers=[];

function shuffle(a){let b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]]}return b}

function renderIntro(){
  const el=document.getElementById('scr-intro');
  el.innerHTML=`<div class="intro-header">
    <div class="intro-title">Choose your case</div>
    <p class="intro-sub">Each case is based on a real misinformation pattern. Work through all three phases — Critical Thinking, Initial Verification, and Technical Tools — earning points at each stage.</p>
  </div>
  <div class="case-grid" id="case-grid"></div>
  <button class="opt primary wide" id="start-btn" disabled>Begin investigation →</button>`;
  const grid=document.getElementById('case-grid');
  CASES.forEach(c=>{
    const card=document.createElement('div');card.className='c-card';
    card.innerHTML=`<div class="c-tag">${c.tag}</div><div class="c-title">${c.title}</div>`;
    card.onclick=()=>{document.querySelectorAll('.c-card').forEach(x=>x.classList.remove('picked'));card.classList.add('picked');selCase=c;document.getElementById('start-btn').disabled=false};
    grid.appendChild(card);
  });
  document.getElementById('start-btn').onclick=()=>{if(!selCase)return;startPhase(1)};
}

function startPhase(p){
  phase=p;
  ['scr-intro','scr-game','scr-verdict'].forEach(id=>document.getElementById(id).style.display='none');
  const pi=document.getElementById('scr-phase-intro');pi.style.display='block';
  const defs=[
    {num:1,title:"Critical thinking",sub:"The Mind Filter",desc:"Before touching any tools, apply your analytical instincts. Examine the post's language, intent, sourcing style, and your own potential biases.",skills:["Emotional tone","Confirmation bias","Intent analysis","Evidence quality","Red flag recognition"]},
    {num:2,title:"Initial verification",sub:"The Digital Footprint",desc:"Investigate the source, URL, timing, and whether the story is corroborated. These are the checks any journalist would run in the first ten minutes.",skills:["Source credibility","URL analysis","Temporal context","Cross-referencing","Verification order"]},
    {num:3,title:"Technical tools",sub:"The Digital Lab",desc:"Use real investigative tools: fact-check databases, reverse image search, and AI deepfake detection. Issue your final verdict with evidence.",skills:["Fact-check tools","Image verification","AI detection","Final verdict"]}
  ];
  const d=defs[p-1];
  const pills=['Phase 1','Phase 2','Phase 3'].map((lbl,i)=>`<div class="phase-pip ${i+1<p?'done':i+1===p?'act':''}">${i+1<p?'✓ ':''} ${lbl}</div>`).join('');
  pi.innerHTML=`<div class="prog-phases" style="margin-bottom:1.5rem">${pills}</div>
  <div class="phase-intro-card">
    <div class="p-num">Phase ${p} of 3</div>
    <div class="p-title">${d.title}</div>
    <div class="p-sub">${d.sub}</div>
    <div class="p-desc">${d.desc}</div>
    <div class="skill-tags">${d.skills.map(s=>`<span class="skill-tag">${s}</span>`).join('')}</div>
  </div>
  <button class="opt primary wide" onclick="launchPhase(${p})">Start phase ${p} →</button>`;
}

function launchPhase(p){
  document.getElementById('scr-phase-intro').style.display='none';
  const qs=p===1?P1_QS:p===2?P2_QS:P3_QS;
  qQueue=p===3?[...P3_QS]:shuffle(qs).slice(0,p===1?5:4);
  qIdx=0;
  document.getElementById('scr-game').style.display='block';
  renderQ();
}

function renderQ(){
  const q=qQueue[qIdx];const total=qQueue.length;const pct=Math.round((qIdx/total)*100);const c=selCase;
  const phaseName=phase===1?'Phase 1 — Critical thinking':phase===2?'Phase 2 — Initial verification':'Phase 3 — Technical tools';
  const pills=['Phase 1','Phase 2','Phase 3'].map((lbl,i)=>`<div class="phase-pip ${i+1<phase?'done':i+1===phase?'act':''}">${i+1<phase?'✓ ':''} ${lbl}</div>`).join('');
  document.getElementById('scr-game').innerHTML=`
    <div class="prog-phases">${pills}</div>
    <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem;margin-top:6px">
      <span style="font-size:12px;color:var(--text3);letter-spacing:.04em;text-transform:uppercase">${phaseName}</span>
      <span style="font-size:12px;color:var(--text3)">Q${qIdx+1} of ${total} · ${q.skill}</span>
    </div>
    <div class="card">
      <div class="src-row"><div class="avatar">${c.source.i}</div><div><div class="src-name">${c.source.name}</div><div class="src-handle">${c.source.h}</div></div></div>
      <div class="headline">${c.title}</div>
      <div class="body-txt">${c.body}</div>
      ${phase>=2?`<div class="url-bar">🌐 ${c.url}</div>`:''}
      <div class="news-meta">${c.meta}</div>
    </div>
    <div class="card-sm">
      <div class="q-text">${q.text}</div>
      ${q.hint?`<div class="q-hint">${q.hint}</div>`:''}
      <div id="q-body"></div>
      <div class="fb" id="fb"></div>
    </div>
    <button class="opt primary wide" id="next-btn" style="display:none" onclick="nextQ()">${qIdx+1<total?'Next question →':phase<3?`Proceed to Phase ${phase+1} →`:'See final verdict →'}</button>`;
  if(q.type==='c4')renderC4(q);
  else if(q.type==='drag')renderDrag(q);
  else if(q.type==='rank')renderRank(q);
  else if(q.type==='tool')renderTool(q);
  else if(q.type==='meter')renderMeter(q);
}

function renderC4(q){
  const opts=shuffle(q.opts);const body=document.getElementById('q-body');
  const wrap=document.createElement('div');wrap.className='opts';
  opts.forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt';btn.textContent=opt.t;
    btn.onclick=()=>{
      wrap.querySelectorAll('button').forEach(b=>{b.disabled=true;if(b===btn)b.classList.add(opt.ok?'ok':'bad');else if(b.textContent===opts.find(o=>o.ok)?.t)b.classList.add('reveal')});
      const pts=opt.ok?20:0;if(opt.ok)score+=pts;
      document.getElementById('score-disp').textContent=score;
      answers.push({skill:q.skill,ok:opt.ok});
      showFB(opt.ok,opt.fb,pts);
      document.getElementById('next-btn').style.display='block';
    };
    wrap.appendChild(btn);
  });
  body.appendChild(wrap);
}

function renderDrag(q){
  const body=document.getElementById('q-body');
  body.innerHTML=`<div class="drag-grid">
    <div><div class="zone-lbl red">🚩 Red flag</div><div class="drag-zone" id="z-red" data-z="red"></div></div>
    <div><div class="zone-lbl green">✅ Green flag</div><div class="drag-zone" id="z-green" data-z="green"></div></div>
  </div>
  <div class="pool-lbl">Drag these phrases:</div>
  <div class="drag-zone" id="z-pool" style="margin-bottom:10px"></div>
  <button class="opt primary wide" id="drag-go">Check my sorting →</button>`;
  const pool=document.getElementById('z-pool');
  shuffle(q.items).forEach(item=>{
    const chip=document.createElement('div');chip.className='chip';chip.draggable=true;chip.dataset.lbl=item.l;chip.dataset.z=item.z;chip.textContent=item.l;
    chip.addEventListener('dragstart',e=>e.dataTransfer.setData('text',item.l));
    pool.appendChild(chip);
  });
  ['z-red','z-green','z-pool'].forEach(id=>{
    const zone=document.getElementById(id);
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('over')});
    zone.addEventListener('dragleave',()=>zone.classList.remove('over'));
    zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('over');const lbl=e.dataTransfer.getData('text');const chip=document.querySelector(`.chip[data-lbl="${CSS.escape(lbl)}"]`);if(chip)zone.appendChild(chip)});
  });
  document.getElementById('drag-go').onclick=()=>{
    const red=[...document.getElementById('z-red').querySelectorAll('.chip')];
    const green=[...document.getElementById('z-green').querySelectorAll('.chip')];
    let ok=0,tot=q.items.length;
    red.forEach(c=>{if(c.dataset.z==='red'){c.classList.add('cok');ok++}else c.classList.add('cbad')});
    green.forEach(c=>{if(c.dataset.z==='green'){c.classList.add('cok');ok++}else c.classList.add('cbad')});
    document.querySelectorAll('#z-pool .chip').forEach(c=>c.classList.add('cbad'));
    document.getElementById('drag-go').style.display='none';
    document.querySelectorAll('.chip').forEach(c=>{c.draggable=false});
    const pts=Math.round((ok/tot)*30);score+=pts;
    document.getElementById('score-disp').textContent=score;
    answers.push({skill:q.skill,ok:ok>=Math.ceil(tot*.7)});
    showFB(ok>=Math.ceil(tot*.7),`You placed ${ok} of ${tot} items correctly (+${pts} pts). Green highlight = correct placement.`,pts);
    document.getElementById('next-btn').style.display='block';
  };
}

function renderRank(q){
  const body=document.getElementById('q-body');
  const items=shuffle(q.items);let selIdx=null;
  const wrap=document.createElement('div');wrap.className='opts';wrap.id='rank-wrap';
  items.forEach((item,i)=>{
    const div=document.createElement('div');div.className='rank-item';div.dataset.i=i;div.dataset.correct=item.order;
    div.innerHTML=`<span class="grip">⠿</span><span>${item.t}</span>`;
    div.onclick=()=>{
      if(div.classList.contains('rk-ok')||div.classList.contains('rk-bad'))return;
      if(selIdx===null){div.classList.add('sel');selIdx=i}
      else{
        const other=wrap.querySelector(`.rank-item[data-i="${selIdx}"]`);
        if(other&&other!==div){const th=other.innerHTML;other.innerHTML=div.innerHTML;div.innerHTML=th;const ti=other.dataset.i,tc=other.dataset.correct;other.dataset.i=div.dataset.i;other.dataset.correct=div.dataset.correct;div.dataset.i=ti;div.dataset.correct=tc}
        wrap.querySelectorAll('.rank-item').forEach(x=>x.classList.remove('sel'));selIdx=null;
      }
    };
    wrap.appendChild(div);
  });
  body.appendChild(wrap);
  const btn=document.createElement('button');btn.className='opt primary';btn.style.width='100%';btn.style.marginTop='8px';btn.textContent='Check my order →';
  btn.onclick=()=>{
    const ranked=[...wrap.querySelectorAll('.rank-item')];let ok=0;
    ranked.forEach((r,pos)=>{const correct=parseInt(r.dataset.correct)===pos;if(correct)ok++;r.classList.add(correct?'rk-ok':'rk-bad');r.style.cursor='default'});
    btn.remove();
    const pts=Math.round((ok/ranked.length)*25);score+=pts;
    document.getElementById('score-disp').textContent=score;
    answers.push({skill:q.skill,ok:ok>=Math.ceil(ranked.length*.6)});
    showFB(ok>=Math.ceil(ranked.length*.6),`${ok} of ${ranked.length} steps in the correct order (+${pts} pts). Correct sequence: check URL/date → search major news → check account history → reverse image search → professional fact-check database.`,pts);
    document.getElementById('next-btn').style.display='block';
  };
  body.appendChild(btn);
}

function renderTool(q){
  const c=selCase;
  const resultText=q.id==='reverse_img'?c.imgResult:q.id==='factcheck_tool'?c.factResult:c.deepfakeResult;
  const body=document.getElementById('q-body');
  body.innerHTML=`<button class="tool-btn" id="tool-open"><span class="tool-icon">${q.toolIcon}</span><span>${q.toolLabel}</span></button>
  <div class="tool-result" id="tool-result"><strong>Result:</strong> ${resultText}</div>
  <div class="opts" id="tool-opts" style="display:none"></div>`;
  document.getElementById('tool-open').onclick=()=>{
    const tb=document.getElementById('tool-open');
    tb.innerHTML=`<span class="tool-icon">✓</span><span>${q.toolLabel} — result received</span>`;
    tb.classList.add('used');tb.style.cursor='default';
    document.getElementById('tool-result').classList.add('show');
    const opts=document.getElementById('tool-opts');opts.style.display='flex';
    const p=document.createElement('p');p.style.cssText='font-size:13px;font-weight:500;margin-bottom:8px';p.textContent='What does this result tell you?';opts.appendChild(p);
    q.opts.forEach(opt=>{
      const btn=document.createElement('button');btn.className='opt';btn.textContent=opt.t;
      btn.onclick=()=>{
        opts.querySelectorAll('button').forEach(b=>{b.disabled=true;if(b===btn)b.classList.add(opt.ok?'ok':'bad');else if(b.textContent===q.opts.find(o=>o.ok)?.t)b.classList.add('reveal')});
        const pts=opt.ok?20:0;if(opt.ok)score+=pts;
        document.getElementById('score-disp').textContent=score;
        answers.push({skill:q.skill,ok:opt.ok});
        showFB(opt.ok,opt.fb,pts);
        document.getElementById('next-btn').style.display='block';
      };
      opts.appendChild(btn);
    });
  };
}

function renderMeter(q){
  let mval=50;
  const body=document.getElementById('q-body');
  body.innerHTML=`<div class="meter-labels"><span>Not credible</span><span>Highly credible</span></div>
  <div class="meter-track"><div class="meter-fill" id="mfill" style="width:50%;background:#dc2626"></div></div>
  <input type="range" min="0" max="100" value="50" step="1" id="mslider">
  <div class="meter-val">Credibility: <strong id="mval-disp">50%</strong></div>
  <div class="opts" style="margin-top:10px">
    <p style="font-size:13px;font-weight:500;margin-bottom:8px">Issue your final verdict:</p>
    <button class="opt" id="v-true">TRUE — the claim is credible and well-sourced</button>
    <button class="opt" id="v-misleading">MISLEADING — partially true but decontextualised</button>
    <button class="opt" id="v-false">FALSE — the claim is fabricated or manipulated</button>
  </div>`;
  document.getElementById('mslider').oninput=function(){
    mval=parseInt(this.value);
    document.getElementById('mval-disp').textContent=mval+'%';
    const fill=document.getElementById('mfill');
    fill.style.width=mval+'%';
    fill.style.background=mval>=70?'#16a34a':mval>=40?'#d97706':'#dc2626';
  };
  ['v-true','v-misleading','v-false'].forEach(id=>{
    document.getElementById(id).onclick=()=>{
      const correct=id==='v-false';
      ['v-true','v-misleading','v-false'].forEach(x=>{const b=document.getElementById(x);b.disabled=true;if(x===id)b.classList.add(correct?'ok':'bad');else if(x==='v-false')b.classList.add('reveal')});
      document.getElementById('mslider').disabled=true;
      const pts=correct?25:0;if(correct)score+=pts;
      document.getElementById('score-disp').textContent=score;
      answers.push({skill:'Final verdict',ok:correct});
      showFB(correct,correct?`Correct. All three phases pointed to the same conclusion: this story is FALSE. Your meter was at ${mval}% — a professional would put it below 15%.`:`The correct verdict is FALSE. Review the evidence from all three phases: fabricated source, recycled image, debunked by fact-checkers, AI-manipulated video.`,pts);
      document.getElementById('next-btn').style.display='block';
    };
  });
}

function showFB(ok,text,pts){
  const fb=document.getElementById('fb');
  fb.className='fb show '+(ok?'good':'bad');
  fb.innerHTML=`<strong>${ok&&pts>0?`+${pts} pts — `:'No points — '}</strong>${text}`;
}

function nextQ(){
  qIdx++;
  if(qIdx>=qQueue.length){
    const prev=phaseScores.slice(0,phase-1).reduce((a,b)=>a+b,0);
    phaseScores[phase-1]=score-prev;
    if(phase<3){startPhase(phase+1)}else{showVerdict()}
    return;
  }
  renderQ();
}

function showVerdict(){
  document.getElementById('scr-game').style.display='none';
  const v=document.getElementById('scr-verdict');v.style.display='block';
  const maxScore=170;const pct=Math.round((score/maxScore)*100);
  let tier,icon,sub;
  if(pct>=80){tier='Master Detective';icon='🔍';sub='Outstanding. You applied every skill across all three phases — critical thinking, source verification, and technical forensics — to reach the correct verdict.'}
  else if(pct>=55){tier='Good Agent';icon='🕵️';sub='Solid work. You caught most of the key signals but a few slipped through. Review your missed questions — they reveal where your blind spots are.'}
  else{tier='Keep Training';icon='📋';sub='Misinformation is engineered to fool you. Now you know what the traps look like — replay with a different case to build your instincts systematically.'}
  const skillMap={};answers.forEach(a=>{if(!skillMap[a.skill])skillMap[a.skill]={c:0,t:0};skillMap[a.skill].t++;if(a.ok)skillMap[a.skill].c++});
  const skillRows=Object.entries(skillMap).map(([k,val])=>`<div class="skill-row"><div class="skill-name">${k}</div><div class="skill-bar"><div class="skill-fill" style="width:${Math.round((val.c/val.t)*100)}%"></div></div><div class="skill-count">${val.c}/${val.t}</div></div>`).join('');
  const phaseBreak=['Phase 1 — Critical thinking','Phase 2 — Initial verification','Phase 3 — Technical tools'].map((n,i)=>`<div class="phase-row"><span style="color:var(--text2)">${n}</span><span style="font-weight:500">${phaseScores[i]} pts</span></div>`).join('');
  v.innerHTML=`<div class="verdict-wrap">
    <div class="v-icon">${icon}</div>
    <div class="v-title">${tier}</div>
    <div class="v-sub">Score: <strong>${score} / ${maxScore}</strong> (${pct}%)<br>${sub}</div>
    <div class="skill-box"><div class="skill-box-title">Skills breakdown</div>${skillRows}</div>
    <div class="skill-box"><div class="skill-box-title">Points by phase</div>${phaseBreak}</div>
    <div class="case-box">
      <div class="verdict-badge">VERDICT: ${selCase.verdict}</div>
      <div class="case-context">${selCase.realContext}</div>
    </div>
    <button class="opt primary wide" onclick="restart()">Investigate a different case →</button>
  </div>`;
}

function restart(){
  document.getElementById('scr-verdict').style.display='none';
  document.getElementById('scr-intro').style.display='block';
  selCase=null;score=0;phaseScores=[0,0,0];answers=[];phase=1;
  document.getElementById('score-disp').textContent='0';
  document.querySelectorAll('.c-card').forEach(c=>c.classList.remove('picked'));
}

renderIntro();
</script>
</body>
</html>
