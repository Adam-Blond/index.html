    <p class="intro-sub">Each case is based on a real misinformation pattern. You'll work through all three phases — Critical Thinking, Initial Verification, and Technical Tools — earning points at each stage.</p>
    <div class="case-grid" id="case-grid"></div>
    <button class="opt" id="start-btn" disabled style="opacity:.4;cursor:not-allowed;width:100%;text-align:center">Begin investigation ↗</button>
  </div>`;
  const grid=document.getElementById('case-grid');
  CASES.forEach(c=>{
    const card=document.createElement('div');
    card.className='c-card';
    card.innerHTML=`<div class="c-tag">${c.tag}</div><div class="c-title">${c.title}</div>`;
    card.onclick=()=>{document.querySelectorAll('.c-card').forEach(x=>x.classList.remove('picked'));card.classList.add('picked');selCase=c;const b=document.getElementById('start-btn');b.disabled=false;b.style.opacity='1';b.style.cursor='pointer'};
    grid.appendChild(card);
  });
  document.getElementById('start-btn').onclick=()=>{if(!selCase)return;startPhase(1)};
}

function startPhase(p){
  phase=p;
  document.getElementById('scr-intro').style.display='none';
  document.getElementById('scr-game').style.display='none';
  document.getElementById('scr-verdict').style.display='none';
  const pi=document.getElementById('scr-phase-intro');
  pi.style.display='block';
  const defs=[
    {num:1,title:"Phase 1 — Critical thinking",sub:"The Mind Filter",desc:"Before touching any tools, apply your analytical instincts. Examine the post's language, intent, sourcing style, and your own potential biases.",skills:["Emotional tone","Confirmation bias","Intent analysis","Evidence quality","Red flag recognition"]},
    {num:2,title:"Phase 2 — Initial verification",sub:"The Digital Footprint",desc:"Now investigate the source, URL, timing, and whether the story is corroborated. These are the checks any journalist would run in the first ten minutes.",skills:["Source credibility","URL analysis","Temporal context","Cross-referencing","Verification order"]},
    {num:3,title:"Phase 3 — Technical tools",sub:"The Digital Lab",desc:"Use real investigative tools: fact-check databases, reverse image search, and AI deepfake detection. Issue your final verdict with evidence.",skills:["Fact-check tools","Image verification","AI detection","Final verdict"]}
  ];
  const d=defs[p-1];
  const pills=['Phase 1','Phase 2','Phase 3'].map((lbl,i)=>`<div class="p-pill ${i+1<p?'done':i+1===p?'act':''}">${i+1<p?'<i class="ti ti-check" aria-hidden="true"></i> ':''} ${lbl}</div>`).join('');
  pi.innerHTML=`<div style="padding:1rem 0">
    <div class="phase-pills">${pills}</div>
    <div class="phase-intro">
      <div class="phase-intro-title">${d.title}<br><span style="font-size:13px;font-weight:400;color:var(--color-text-secondary)">${d.sub}</span></div>
      <div class="phase-intro-body" style="margin-top:8px">${d.desc}</div>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:10px">${d.skills.map(s=>`<span style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--color-text-secondary)">${s}</span>`).join('')}</div>
    </div>
    <button class="opt" style="width:100%;text-align:center" onclick="launchPhase(${p})">Start phase ${p} →</button>
  </div>`;
}

function launchPhase(p){
  document.getElementById('scr-phase-intro').style.display='none';
  const qs=p===1?P1_QS:p===2?P2_QS:P3_QS;
  qQueue=p===3?[...P3_QS]:shuffle(qs).slice(0,p===1?5:4);
  qIdx=0;
  document.getElementById('scr-game').style.display='block';
  renderQ();
}

function renderQ(){
  const q=qQueue[qIdx];
  const total=qQueue.length;
  const pct=Math.round((qIdx/total)*100);
  const c=selCase;
  const screen=document.getElementById('scr-game');
  const phaseName=phase===1?'Phase 1 — Critical thinking':phase===2?'Phase 2 — Initial verification':'Phase 3 — Technical tools';
  screen.innerHTML=`
    <div class="hdr">
      <span class="phase-badge active">${phaseName}</span>
      <div class="score-wrap"><span class="score-lbl">Points</span><span class="score-num" id="score-disp">${score}</span></div>
    </div>
    <div class="prog-track"><div class="prog-fill" id="prog" style="width:${pct}%"></div></div>
    <div class="news-card">
      <div class="src-row"><div class="avatar">${c.source.i}</div><div><div class="src-name">${c.source.name}</div><div class="src-handle">${c.source.h}</div></div></div>
      <div class="headline">${c.title}</div>
      <div class="body-txt">${c.body}</div>
      ${phase>=2?`<div class="url-bar"><i class="ti ti-world" aria-hidden="true" style="font-size:14px"></i> ${c.url}</div>`:''}
      <div class="meta">${c.meta}</div>
    </div>
    <div class="q-card">
      <div class="q-phase-lbl">Q${qIdx+1} of ${total} · ${q.skill}</div>
      <div class="q-text">${q.text}</div>
      ${q.hint?`<div class="q-hint"><i class="ti ti-bulb" aria-hidden="true"></i> ${q.hint}</div>`:''}
      <div id="q-body"></div>
      <div class="fb" id="fb"></div>
    </div>
    <button class="opt next-btn" id="next-btn" style="display:none" onclick="nextQ()">${qIdx+1<total?'Next question →':phase<3?`Proceed to Phase ${phase+1} →`:'See final verdict →'}</button>`;
  if(q.type==='c4')renderC4(q);
  else if(q.type==='drag')renderDrag(q);
  else if(q.type==='rank')renderRank(q);
  else if(q.type==='tool')renderTool(q);
  else if(q.type==='meter')renderMeter(q);
}

function renderC4(q){
  const opts=shuffle(q.opts);
  const body=document.getElementById('q-body');
  const wrap=document.createElement('div');wrap.className='opts';
  opts.forEach(opt=>{
    const btn=document.createElement('button');btn.className='opt';btn.textContent=opt.t;
    btn.onclick=()=>{
      wrap.querySelectorAll('button').forEach(b=>{b.disabled=true;if(b===btn)b.classList.add(opt.ok?'ok':'bad');else if(b.textContent===opts.find(o=>o.ok)?.t)b.classList.add('reveal')});
      const pts=opt.ok?20:0;if(opt.ok)score+=pts;
      document.getElementById('score-disp').textContent=score;
      answers.push({skill:q.skill,ok:opt.ok});
      showFB(opt.ok,opt.fb,pts);
      document.getElementById('next-btn').style.display='block';
    };
    wrap.appendChild(btn);
  });
  body.appendChild(wrap);
}

function renderDrag(q){
  const body=document.getElementById('q-body');
  body.innerHTML=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
    <div><div class="zone-lbl" style="color:var(--color-text-danger)"><i class="ti ti-flag" aria-hidden="true"></i> Red flag</div><div class="drag-zone" id="z-red" data-z="red"></div></div>
    <div><div class="zone-lbl" style="color:var(--color-text-success)"><i class="ti ti-shield-check" aria-hidden="true"></i> Green flag</div><div class="drag-zone" id="z-green" data-z="green"></div></div>
  </div>
  <div class="zone-lbl">Drag these:</div>
  <div class="drag-zone" id="z-pool" data-z="pool" style="margin-bottom:10px"></div>
  <button class="opt" id="drag-go" onclick="checkDrag()" style="width:100%">Check my sorting →</button>`;
  const pool=document.getElementById('z-pool');
  shuffle(q.items).forEach(item=>{
    const chip=document.createElement('div');chip.className='chip';chip.draggable=true;chip.dataset.lbl=item.l;chip.dataset.z=item.z;chip.textContent=item.l;
    chip.addEventListener('dragstart',e=>e.dataTransfer.setData('text',item.l));
    pool.appendChild(chip);
  });
  ['z-red','z-green','z-pool'].forEach(id=>{
    const zone=document.getElementById(id);
    zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('over')});
    zone.addEventListener('dragleave',()=>zone.classList.remove('over'));
    zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('over');const lbl=e.dataTransfer.getData('text');const chip=document.querySelector(`.chip[data-lbl="${CSS.escape(lbl)}"]`);if(chip)zone.appendChild(chip)});
  });
}

function checkDrag(){
  const q=qQueue[qIdx];
  const red=[...document.getElementById('z-red').querySelectorAll('.chip')];
  const green=[...document.getElementById('z-green').querySelectorAll('.chip')];
  let ok=0,tot=q.items.length;
  red.forEach(c=>{if(c.dataset.z==='red'){c.classList.add('cok');ok++}else c.classList.add('cbad')});
  green.forEach(c=>{if(c.dataset.z==='green'){c.classList.add('cok');ok++}else c.classList.add('cbad')});
  document.querySelectorAll('#z-pool .chip').forEach(c=>c.classList.add('cbad'));
  document.getElementById('drag-go').style.display='none';
  document.querySelectorAll('.chip').forEach(c=>{c.draggable=false});
  const pts=Math.round((ok/tot)*30);score+=pts;
  document.getElementById('score-disp').textContent=score;
  answers.push({skill:q.skill,ok:ok>=Math.ceil(tot*.7)});
  showFB(ok>=Math.ceil(tot*.7),`You placed ${ok} of ${tot} items correctly (+${pts} pts). Green = correct.`,pts);
  document.getElementById('next-btn').style.display='block';
}

function renderRank(q){
  const body=document.getElementById('q-body');
  const items=shuffle(q.items);
  let selIdx=null;
  const wrap=document.createElement('div');wrap.className='opts';wrap.id='rank-wrap';
  items.forEach((item,i)=>{
    const div=document.createElement('div');div.className='rank-item';div.dataset.i=i;div.dataset.correct=item.order;
    div.innerHTML=`<i class="ti ti-grip-vertical" aria-hidden="true"></i><span>${item.t}</span>`;
    div.onclick=()=>{
      if(div.classList.contains('rk-ok')||div.classList.contains('rk-bad'))return;
      if(selIdx===null){div.classList.add('sel');selIdx=i}
      else{
        const other=wrap.querySelector(`.rank-item[data-i="${selIdx}"]`);
        if(other&&other!==div){const tmp=other.innerHTML;other.innerHTML=div.innerHTML;div.innerHTML=tmp;const ti=other.dataset.i,tc=other.dataset.correct;other.dataset.i=div.dataset.i;other.dataset.correct=div.dataset.correct;div.dataset.i=ti;div.dataset.correct=tc;}
        wrap.querySelectorAll('.rank-item').forEach(x=>x.classList.remove('sel'));selIdx=null;
      }
    };
    wrap.appendChild(div);
  });
  body.appendChild(wrap);
  const btn=document.createElement('button');btn.className='opt';btn.style.width='100%';btn.style.marginTop='8px';btn.textContent='Check my order →';
  btn.onclick=()=>{
    const ranked=[...wrap.querySelectorAll('.rank-item')];
    let ok=0;
    ranked.forEach((r,pos)=>{
      const correct=parseInt(r.dataset.correct)===pos;
      if(correct)ok++;
      r.classList.add(correct?'rk-ok':'rk-bad');r.style.cursor='default';
    });
    btn.remove();
    const pts=Math.round((ok/ranked.length)*25);score+=pts;
    document.getElementById('score-disp').textContent=score;
    answers.push({skill:q.skill,ok:ok>=Math.ceil(ranked.length*.6)});
    showFB(ok>=Math.ceil(ranked.length*.6),`${ok} of ${ranked.length} steps in the correct order (+${pts} pts). The correct sequence: check URL/date → search major news sites → check account history → reverse image search → professional fact-check database.`,pts);
    document.getElementById('next-btn').style.display='block';
  };
  body.appendChild(btn);
}

function renderTool(q){
  const body=document.getElementById('q-body');
  const c=selCase;
  const resultText=q.id==='reverse_img'?c.imgResult:q.id==='factcheck_tool'?c.factResult:c.deepfakeResult;
  body.innerHTML=`
    <button class="tool-btn" id="tool-open" style="width:100%;margin-bottom:10px">
      <i class="ti ${q.toolIcon}" aria-hidden="true" style="font-size:18px"></i> ${q.toolLabel}
    </button>
    <div class="tool-result" id="tool-result"><i class="ti ti-report-search" aria-hidden="true" style="font-size:15px"></i> <strong>Result:</strong> ${resultText}</div>
    <div class="opts" id="tool-opts" style="display:none"></div>`;
  document.getElementById('tool-open').onclick=()=>{
    document.getElementById('tool-open').classList.add('used');
    document.getElementById('tool-open').innerHTML=`<i class="ti ti-check" aria-hidden="true" style="font-size:18px"></i> ${q.toolLabel} — result received`;
    document.getElementById('tool-result').classList.add('show');
    const opts=document.getElementById('tool-opts');opts.style.display='flex';
    const p=document.createElement('p');p.style.cssText='font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px';p.textContent='What does this result tell you?';opts.appendChild(p);
    q.opts.forEach(opt=>{
      const btn=document.createElement('button');btn.className='opt';btn.textContent=opt.t;
      btn.onclick=()=>{
        opts.querySelectorAll('button').forEach(b=>{b.disabled=true;if(b===btn)b.classList.add(opt.ok?'ok':'bad');else if(b.textContent===q.opts.find(o=>o.ok)?.t)b.classList.add('reveal')});
        const pts=opt.ok?20:0;if(opt.ok)score+=pts;
        document.getElementById('score-disp').textContent=score;
        answers.push({skill:q.skill,ok:opt.ok});
        showFB(opt.ok,opt.fb,pts);
        document.getElementById('next-btn').style.display='block';
      };
      opts.appendChild(btn);
    });
  };
}

function renderMeter(q){
  const body=document.getElementById('q-body');
  let mval=50;
  body.innerHTML=`
    <div class="meter-wrap">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:6px"><span>Not credible</span><span>Highly credible</span></div>
      <div class="meter-track"><div class="meter-fill" id="mfill" style="width:50%"></div></div>
      <input type="range" min="0" max="100" value="50" step="1" id="mslider" style="width:100%;margin-top:6px">
      <div style="text-align:center;font-size:13px;color:var(--color-text-secondary);margin-top:4px">Credibility: <strong id="mval-disp">50%</strong></div>
    </div>
    <div class="opts" style="margin-top:10px">
      <p style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px">Issue your final verdict:</p>
      <button class="opt" id="v-true">TRUE — the claim is credible and well-sourced</button>
      <button class="opt" id="v-misleading">MISLEADING — partially true but decontextualised</button>
      <button class="opt" id="v-false">FALSE — the claim is fabricated or manipulated</button>
    </div>`;
  const slider=document.getElementById('mslider');
  const fill=document.getElementById('mfill');
  const valDisp=document.getElementById('mval-disp');
  slider.oninput=()=>{
    mval=parseInt(slider.value);
    fill.style.width=mval+'%';
    valDisp.textContent=mval+'%';
    fill.className='meter-fill'+(mval>=70?' high':mval>=40?' mid':'');
  };
  ['v-true','v-misleading','v-false'].forEach(id=>{
    document.getElementById(id).onclick=()=>{
      const correct=id==='v-false';
      ['v-true','v-misleading','v-false'].forEach(x=>{const b=document.getElementById(x);b.disabled=true;if(x===id)b.classList.add(correct?'ok':'bad');else if(x==='v-false')b.classList.add('reveal')});
      slider.disabled=true;
      const pts=correct?25:0;if(correct)score+=pts;
      document.getElementById('score-disp').textContent=score;
      answers.push({skill:q.skill,ok:correct});
      showFB(correct,correct?`Correct! All three phases pointed to the same conclusion: this story is FALSE. Your credibility meter was set to ${mval}% — a professional fact-checker would put it below 15%.`:`The correct verdict is FALSE. Review the evidence from all three phases: fabricated source, recycled image, debunked by fact-checkers, and AI-manipulated video.`,pts);
      document.getElementById('next-btn').style.display='block';
    };
  });
}

function showFB(ok,text,pts){
  const fb=document.getElementById('fb');
  fb.className='fb show '+(ok?'good':'bad');
  fb.innerHTML=`${ok?'<i class="ti ti-circle-check" aria-hidden="true"></i>':'<i class="ti ti-circle-x" aria-hidden="true"></i>'} <strong>${ok&&pts>0?`+${pts} pts — `:'No points — '}</strong>${text}`;
}

function nextQ(){
  qIdx++;
  if(qIdx>=qQueue.length){
    phaseScores[phase-1]=score-(phaseScores.slice(0,phase-1).reduce((a,b)=>a+b,0));
    if(phase<3){startPhase(phase+1)}else{showVerdict()}
    return;
  }
  renderQ();
}

function showVerdict(){
  document.getElementById('scr-game').style.display='none';
  const v=document.getElementById('scr-verdict');v.style.display='block';
  const maxScore=170;
  const pct=Math.round((score/maxScore)*100);
  let tier,icon,sub;
  if(pct>=80){tier='Master Detective';icon='🔍';sub='Outstanding. You applied every skill across all three phases — critical thinking, source verification, and technical forensics — to reach the correct verdict.'}
  else if(pct>=55){tier='Good Agent';icon='🕵️';sub='Solid work. You caught most of the key signals but a few slipped through. Review your missed questions — they reveal where your blind spots are.'}
  else{tier='Keep Training';icon='📋';sub='Misinformation is engineered to fool you. Now you know what the traps look like — replay with a different case to build your instincts systematically.'}

  const skillMap={};answers.forEach(a=>{if(!skillMap[a.skill])skillMap[a.skill]={c:0,t:0};skillMap[a.skill].t++;if(a.ok)skillMap[a.skill].c++});
  const skillRows=Object.entries(skillMap).map(([k,val])=>`<div class="skill-row"><div class="skill-name">${k}</div><div class="skill-bar"><div class="skill-fill" style="width:${Math.round((val.c/val.t)*100)}%"></div></div><div style="font-size:12px;color:var(--color-text-secondary);width:28px;text-align:right">${val.c}/${val.t}</div></div>`).join('');

  const phaseNames=['Phase 1','Phase 2','Phase 3'];
  const phaseBreak=phaseScores.map((ps,i)=>`<div style="display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:0.5px solid var(--color-border-tertiary)"><span style="color:var(--color-text-secondary)">${phaseNames[i]}</span><span style="color:var(--color-text-primary);font-weight:500">${ps} pts</span></div>`).join('');

  v.innerHTML=`<div class="verdict-wrap">
    <div class="v-icon">${icon}</div>
    <div class="v-title">${tier}</div>
    <div class="v-sub">Total score: <strong>${score} / ${maxScore}</strong> (${pct}%)<br>${sub}</div>
    <div class="skill-box">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px">Skills breakdown</div>
      ${skillRows}
    </div>
    <div class="skill-box">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px">Points by phase</div>
      ${phaseBreak}
    </div>
    <div class="case-box">
      <div style="font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px">About this case — verdict: <span style="color:var(--color-text-danger)">${selCase.verdict}</span></div>
      <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.6">${selCase.realContext}</div>
    </div>
    <button class="opt" style="width:100%;text-align:center" onclick="restart()">Investigate a different case ↗</button>
  </div>`;
}

function restart(){
  document.getElementById('scr-verdict').style.display='none';
  document.getElementById('scr-intro').style.display='block';
  selCase=null;score=0;phaseScores=[0,0,0];answers=[];phase=1;
  document.querySelectorAll('.c-card').forEach(c=>c.classList.remove('picked'));
  const b=document.getElementById('start-btn');if(b){b.disabled=true;b.style.opacity='.4';b.style.cursor='not-allowed';}
}

renderIntro();
</script>
